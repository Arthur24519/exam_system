{% extends "base.html" %}
{% block content %}
<h2>Управление предметами</h2>
<a href="{{ url_for('subject_add') }}" class="btn btn-success mb-3">Добавить предмет</a>
<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for subject in subjects %}
        <tr>
            <td>{{ subject.id }}</td>
            <td>{{ subject.name }}</td>
            <td>
                <a href="{{ url_for('subject_edit', id=subject.id) }}" class="btn btn-sm btn-warning">Редактировать</a>
                <a href="{{ url_for('subject_delete', id=subject.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить предмет? Это также удалит все оценки по нему.')">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
