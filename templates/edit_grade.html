{% extends "base.html" %}
{% block content %}
<h2>Редактировать оценку</h2>
<form method="post">
    <div class="mb-3">
        <label>Студент:</label>
        <select name="student_id" class="form-control" required>
            {% for student in students %}
                <option value="{{ student.id }}" {% if student.id == grade.student_id %}selected{% endif %}>{{ student.username }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label>Предмет:</label>
        <select name="subject_id" class="form-control" required>
            {% for subject in subjects %}
                <option value="{{ subject.id }}" {% if subject.id == grade.subject_id %}selected{% endif %}>{{ subject.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label>Оценка:</label>
        <input type="number" name="grade" value="{{ grade.grade }}" min="0" max="5" step="1" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Дата сдачи:</label>
        <input type="date" name="date" value="{{ grade.date.strftime('%Y-%m-%d') }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Семестр:</label>
        <select name="semester_id" class="form-control" required>
            {% for semester in semesters %}
                <option value="{{ semester.id }}" {% if semester.id == grade.semester_id %}selected{% endif %}>{{ semester.name }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-warning">Обновить</button>
    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
