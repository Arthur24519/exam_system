{% extends "base.html" %}
{% block content %}
<h2>Добавить новую оценку</h2>
<form method="post">
    <div class="mb-3">
        <label>Студент:</label>
        <select name="student_id" class="form-control" required>
            {% for student in students %}
                <option value="{{ student.id }}">{{ student.username }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label>Предмет:</label>
        <select name="subject_id" class="form-control" required>
            {% for subject in subjects %}
                <option value="{{ subject.id }}">{{ subject.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label>Оценка (2-5, или 1/0 для зачета):</label>
        <input type="number" name="grade" min="0" max="5" step="1" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Дата сдачи:</label>
        <input type="date" name="date" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Семестр:</label>
        <select name="semester_id" class="form-control" required>
            {% for semester in semesters %}
                <option value="{{ semester.id }}">{{ semester.name }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
